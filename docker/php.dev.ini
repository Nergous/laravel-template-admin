; =============================================================================
;  PHP-оверрайд для разработки. Монтируется поверх zz-app.ini в compose.dev.yaml.
;  Главное отличие: opcache перечитывает изменённые файлы (validate_timestamps=1),
;  иначе правки в bind-mount'е не подхватывались бы.
; =============================================================================

opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; В dev удобнее видеть ошибки и подробные стеки.
display_errors = On
display_startup_errors = On

; JIT в активной разработке только мешает (warm-up каждый рестарт) — выключаем.
opcache.jit = off
opcache.jit_buffer_size = 0
