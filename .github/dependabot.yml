# Dependabot: weekly updates of dependencies and base images.
# Closes #11 (floating image tags): the docker ecosystem suggests updates for
# base images from the Dockerfile, rather than digest pinning (handier for the template).
version: 2
updates:
  # --- PHP (Composer) ---
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # --- Frontend (npm) ---
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # --- Python bot (pip) ---
  - package-ecosystem: pip
    directory: "/modules/max-bot"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # --- Application base image (Dockerfile + docker-compose) ---
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  # --- Bot base image (modules/max-bot/Dockerfile) ---
  - package-ecosystem: docker
    directory: "/modules/max-bot"
    schedule:
      interval: weekly

  # --- GitHub Actions (action versions in .github/workflows) ---
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
