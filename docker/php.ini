; =============================================================================
;  PHP config for the Laravel Admin Template (FrankenPHP/Caddy).
;  Placed at /usr/local/etc/php/conf.d/zz-app.ini (loaded last).
; =============================================================================

memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
date.timezone = Europe/Moscow
expose_php = Off

; --- Error output (defense-in-depth for prod) ---
; Application errors are handled by Laravel (APP_DEBUG), but PHP-level startup errors
; must not leak into the response. In dev this is overridden via docker/php.dev.ini
; (display_errors = On). We write errors to the log (they end up in the container's stderr).
display_errors = Off
display_startup_errors = Off
log_errors = On

; --- OPcache (prod performance) ---
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; validate_timestamps=0 — the code in the image is immutable (prod). For dev it is overridden
; via docker/php.dev.ini (validate_timestamps=1) so that edits are picked up.
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.jit = tracing
opcache.jit_buffer_size = 64M

realpath_cache_size = 4096k
realpath_cache_ttl = 600
