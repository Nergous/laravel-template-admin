# =============================================================================
#  DEV stack with hot-reload: code bind-mount + Vite dev server + queue + DB.
#
#  Run:
#    cp .env.example .env        # APP_ENV=local, APP_DEBUG=true (the defaults are fine)
#    docker compose -f compose.dev.yaml up --build
#
#  What's inside:
#    app   — FrankenPHP serves Laravel at http://localhost:8000, with the code mounted
#            via bind-mount (PHP edits are picked up: opcache validate_timestamps=1).
#    vite  — Vite dev server (HMR) at http://localhost:5173.
#    queue — queue:listen (re-reads the code on every job, handy in dev).
#    db    — MariaDB (or use SQLite: DB_CONNECTION=sqlite in .env, in which case the
#            db service doesn't need to be started).
#
#  First start: the entrypoint installs vendor/ automatically (composer install),
#  node_modules is installed by the vite service (npm ci) into its own anonymous volume.
# =============================================================================

services:
  app:
    build:
      context: .
      target: dev
    image: laravel-admin-template:dev
    container_name: admin-template-dev-app
    restart: unless-stopped
    env_file: [.env]
    environment:
      APP_ENV: local
      OPTIMIZE: "false"
      RUN_SEEDS: "true"   # in dev it's handy to have demo data
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # vendor/ in a named volume — so it isn't clobbered by an empty folder from the host
      # and doesn't conflict with Windows permissions.
      - vendor-dev:/app/vendor
      - ./docker/php.dev.ini:/usr/local/etc/php/conf.d/zzz-dev.ini:ro
    networks: [internal]
    depends_on:
      db:
        condition: service_healthy

  vite:
    image: node:20-alpine
    container_name: admin-template-dev-vite
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    environment:
      # Listen on all interfaces inside the container, the HMR client — on localhost.
      VITE_HOST: "0.0.0.0"
      VITE_HMR_HOST: "localhost"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node-modules-dev:/app/node_modules
    networks: [internal]

  queue:
    image: laravel-admin-template:dev
    container_name: admin-template-dev-queue
    restart: unless-stopped
    env_file: [.env]
    environment:
      APP_ENV: local
      RUN_MIGRATIONS: "false"
      RUN_SEEDS: "false"
      OPTIMIZE: "false"
    # queue:listen re-reads the code between jobs — exactly what you want in development.
    command: php artisan queue:listen --tries=1 --timeout=0
    volumes:
      - .:/app
      - vendor-dev:/app/vendor
    networks: [internal]
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    container_name: admin-template-dev-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-laravel}
      MARIADB_USER: ${DB_USERNAME:-laravel}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db-data-dev:/var/lib/mysql
    networks: [internal]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: admin-template-dev-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks: [internal]

volumes:
  db-data-dev:
  vendor-dev:
  node-modules-dev:

networks:
  internal:
    driver: bridge
