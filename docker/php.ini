; =============================================================================
;  PHP-конфиг для Laravel Admin Template (FrankenPHP/Caddy).
;  Кладётся в /usr/local/etc/php/conf.d/zz-app.ini (грузится последним).
; =============================================================================

memory_limit = 256M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
date.timezone = Europe/Moscow
expose_php = Off

; --- Вывод ошибок (defense-in-depth для прода) ---
; Ошибки приложения обрабатывает Laravel (APP_DEBUG), но PHP-уровневые ошибки запуска
; не должны утекать в ответ. В dev это переопределяется через docker/php.dev.ini
; (display_errors = On). Пишем ошибки в лог (попадают в stderr контейнера).
display_errors = Off
display_startup_errors = Off
log_errors = On

; --- OPcache (прод-производительность) ---
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; validate_timestamps=0 — код в образе неизменяем (prod). Для dev переопределяется
; через docker/php.dev.ini (validate_timestamps=1), чтобы правки подхватывались.
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.jit = tracing
opcache.jit_buffer_size = 64M

realpath_cache_size = 4096k
realpath_cache_ttl = 600
