name: CI

# Lint, tests (PHP + Python bot), frontend build, build and scan of the prod image.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel outdated runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Code style (Laravel Pint, PSR-12) — fail on deviations.
  # --------------------------------------------------------------------------
  lint-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, fileinfo, intl, bcmath, pdo_sqlite, gd, zip
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v6
        with:
          path: ~/.cache/composer
          key: composer-lint-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-lint-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Pint (check only)
        run: ./vendor/bin/pint --test

  # --------------------------------------------------------------------------
  # PHPUnit on SQLite (:memory:, see phpunit.xml). PHP version matrix.
  # --------------------------------------------------------------------------
  test-php:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, intl, bcmath, pdo_sqlite, gd, zip, pcntl
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v6
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test

  # --------------------------------------------------------------------------
  # Frontend build (Vite). The public/build artifact is a repo smoke test.
  # --------------------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier (check only)
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: public/build
          retention-days: 7

  # --------------------------------------------------------------------------
  # Python bot tests (pytest). Some tests hit a real MariaDB —
  # we bring up a service container. Credentials come from modules/max-bot/.env.example.
  # --------------------------------------------------------------------------
  test-bot:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
          MARIADB_DATABASE: bot-test-db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: modules/max-bot
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  # --------------------------------------------------------------------------
  # Build the prod image (only on push to main/tags). Layer cache via GHA.
  # The image is uploaded as an artifact for the scan job.
  # --------------------------------------------------------------------------
  build-image:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [lint-php, test-php, build-frontend]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build prod image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: prod
          tags: laravel-admin-template:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      # --- Publishing to GHCR (optional) -------------------------------------
      # Uncomment + add `permissions: packages: write` at the job level
      # to push the image to ghcr.io by sha/tags:
      # - name: Login to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      # - name: Push
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     target: prod
      #     push: true
      #     tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
      #     cache-from: type=gha

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: prod-image
          path: /tmp/image.tar
          retention-days: 1

  # --------------------------------------------------------------------------
  # Image scan: Trivy (HIGH/CRITICAL) + anti-regression #1 — verify that
  # no .env / *.sqlite (secrets/data) got into the prod image.
  # --------------------------------------------------------------------------
  scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [build-image]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: prod-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Assert no secrets/data baked into image
        run: |
          docker run --rm --entrypoint sh laravel-admin-template:ci -c '
            bad=""
            [ -f .env ] && bad="$bad .env"
            for f in .env.production .env.local .env.backup; do
              [ -f "$f" ] && bad="$bad $f"
            done
            ls database/*.sqlite *.sqlite >/dev/null 2>&1 && bad="$bad sqlite"
            if [ -n "$bad" ]; then
              echo "LEAK: sensitive files got into the image:$bad"
              exit 1
            fi
            echo "OK: no .env/*.sqlite found in the image"
          '

      - name: Trivy scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: laravel-admin-template:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
