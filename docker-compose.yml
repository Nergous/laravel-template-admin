# =============================================================================
#  Self-contained PRODUCTION stack: app + db (MariaDB) + redis + queue + scheduler.
#
#  Run:
#    cp .env.example .env        # then set APP_ENV=production, APP_DEBUG=false,
#                                # APP_KEY (php artisan key:generate), DB_*/REDIS_* as below
#    docker compose up -d --build
#
#  For development use a separate file:
#    docker compose -f compose.dev.yaml up
#
#  By default the stack is FULLY isolated (its own DB and redis in containers).
#  To connect to an already existing external DB — set DB_HOST to the external
#  address and comment out the `db` service + its depends_on.
#
#  IMPORTANT (TLS): the stack serves the app over PLAIN HTTP (port APP_PORT->8000,
#  auto_https off). This is NOT a fully publicly-facing prod on its own — put
#  it BEHIND an external reverse proxy that terminates TLS (Caddy/Traefik/nginx/ingress).
#  Behind HTTPS, mandatory: SESSION_SECURE_COOKIE=true and HSTS (see .env.example),
#  and it makes sense to narrow trustProxies in bootstrap/app.php to your proxy's CIDR.
#
#  Resource limits (mem_limit/cpus) and log rotation (logging) below are a
#  conservative STARTING point for a single host; tune them for your load.
# =============================================================================

services:
  app:
    build:
      context: .
      target: prod
    image: ${APP_IMAGE:-laravel-admin-template}:latest
    container_name: ${APP_CONTAINER_NAME:-admin-template}-app
    restart: unless-stopped
    env_file: [.env]
    environment:
      RUN_MIGRATIONS: "true"
      # The base RBAC (roles + permissions) is ALWAYS seeded together with the migrations (see entrypoint.sh).
      # RUN_SEEDS only controls DEMO/real USERS (UserSeeder). In production
      # leave it "false" and create the admin via `app:create-admin` (or RUN_SEEDS=true + ADMIN_PASSWORD).
      RUN_SEEDS: "${RUN_SEEDS:-false}"
    ports:
      - "${APP_PORT:-8888}:8000"
    volumes:
      # User data only. Code and vendor live inside the image (immutable).
      - storage-data:/app/storage
    networks: [internal]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Laravel health endpoint (bootstrap/app.php -> health: '/up')
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    # Resource limits (compose v2, non-swarm honors mem_limit/cpus).
    cpus: "1.5"
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  queue:
    # Queue worker: processes Jobs (currently — the asynchronous media upload
    # UploadMedia). Don't want a worker — set QUEUE_CONNECTION=sync in .env and
    # don't bring up this service: the jobs run right inside the app HTTP request. The
    # trade-off and details are in the README (Troubleshooting / Docker section).
    image: ${APP_IMAGE:-laravel-admin-template}:latest
    container_name: ${APP_CONTAINER_NAME:-admin-template}-queue
    restart: unless-stopped
    env_file: [.env]
    environment:
      RUN_MIGRATIONS: "false"
      RUN_SEEDS: "false"
      OPTIMIZE: "false"
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - storage-data:/app/storage
    networks: [internal]
    depends_on:
      # service_healthy ⇒ app has already passed entrypoint (migrations applied, the
      # jobs table exists) — the worker doesn't go into a restart loop on a cold start.
      # restart: unless-stopped remains a safety net against runtime failures.
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # The worker has no HTTP endpoint: liveness = artisan responds and the DB is reachable.
      test: ["CMD", "php", "artisan", "db:show", "--quiet"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    cpus: "1.0"
    mem_limit: 384m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scheduler:
    image: ${APP_IMAGE:-laravel-admin-template}:latest
    container_name: ${APP_CONTAINER_NAME:-admin-template}-scheduler
    restart: unless-stopped
    env_file: [.env]
    environment:
      RUN_MIGRATIONS: "false"
      RUN_SEEDS: "false"
      OPTIMIZE: "false"
    # schedule:work keeps the scheduler in a single process (no system cron needed).
    # Runs the periodic tasks from routes/console.php — at least the daily
    # cleanup of the activity log (model:prune for activity_log).
    command: php artisan schedule:work
    volumes:
      - storage-data:/app/storage
    networks: [internal]
    depends_on:
      # see queue: we wait for service_healthy so we don't start before migrations.
      app:
        condition: service_healthy
      db:
        condition: service_healthy
    cpus: "0.5"
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    # Optional module. Comes up only when COMPOSE_PROFILES=bot.
    profiles: ["bot"]
    build:
      context: ./modules/max-bot
    image: ${APP_IMAGE:-laravel-admin-template}-bot:latest
    container_name: ${APP_CONTAINER_NAME:-admin-template}-bot
    restart: unless-stopped
    # The root .env provides the DB credentials; modules/max-bot/.env — API_TOKEN/BOT_ID/LOG_LEVEL_BOT
    # (template: modules/max-bot/.env.example). The bot's file is wired in at runtime and is NOT
    # baked into the image (modules/max-bot/.dockerignore).
    env_file: [.env, ./modules/max-bot/.env]
    environment:
      # In Docker the bot talks to the `db` service, not to 127.0.0.1 from modules/max-bot/.env.
      DB_HOST: db
      DB_PORT: "3306"
      # Where Laravel's public disk (storage/app/public) is mounted. The bot reads
      # the media-library files attached to messages from here and uploads them to MAX.
      MEDIA_ROOT: /app/storage/app/public
    volumes:
      # The same volume as app/queue/scheduler, but read-only: the bot only needs to read
      # the already uploaded media files, not modify them.
      - storage-data:/app/storage:ro
    networks: [internal]
    depends_on:
      db:
        condition: service_healthy
    cpus: "0.5"
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mariadb:11
    container_name: ${APP_CONTAINER_NAME:-admin-template}-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-laravel}
      MARIADB_USER: ${DB_USERNAME:-laravel}
      # DB passwords are MANDATORY — there are no defaults. compose will fail if they aren't set.
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required for the Docker stack (no default)}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required (no default)}
    volumes:
      - db-data:/var/lib/mysql
    networks: [internal]
    # By default we don't publish the port externally (the DB is reachable only inside the network).
    # For debugging, uncomment:
    # ports:
    #   - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    cpus: "1.0"
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: ${APP_CONTAINER_NAME:-admin-template}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    cpus: "0.5"
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
  redis-data:
  storage-data:

networks:
  internal:
    driver: bridge
