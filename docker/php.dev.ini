; =============================================================================
;  PHP override for development. Mounted on top of zz-app.ini in compose.dev.yaml.
;  The key difference: opcache re-reads changed files (validate_timestamps=1),
;  otherwise edits in the bind-mount would not be picked up.
; =============================================================================

opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; In dev it is more convenient to see errors and detailed stack traces.
display_errors = On
display_startup_errors = On

; JIT only gets in the way during active development (warm-up on every restart) — turn it off.
opcache.jit = off
opcache.jit_buffer_size = 0
